<div nz-row nzJustify="center">
  <div nz-col nzSpan="6" class="content">
    <div style="margin-bottom: 8px;text-align: center;">
      <button nz-button (click)="change()">Refresh Data</button>
    </div>
    <nz-list nzItemLayout="horizontal" [nzLoading]="loading()">
      @for (item of data(); track item) {
        <nz-list-item>
          <nz-list-item-meta
            nzAvatar="https://zos.alipayobjects.com/rmsportal/ODTLcjxAfvqbxHnVXCYX.png"
            [nzDescription]="item.title"
          >
            <nz-list-item-meta-title>
              <a href="https://ng.ant.design">{{ item.description }}</a>
            </nz-list-item-meta-title>
          </nz-list-item-meta>
        </nz-list-item>
      } @empty {
        <nz-list-empty />
      }

    </nz-list>
  </div>
</div>
